name: Upstream Sync

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:
    inputs:
      drill_ff_failure:
        description: "Simulate ff-only failure and run break-glass path without pushing mirror"
        required: false
        default: false
        type: boolean

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync_mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upstream_branch: ${{ steps.sync.outputs.upstream_branch }}
      upstream_sha: ${{ steps.sync.outputs.upstream_sha }}
      mirror_sha: ${{ steps.sync.outputs.mirror_sha }}
      drill_mode: ${{ steps.sync.outputs.drill_mode }}
      ff_ok: ${{ steps.sync.outputs.ff_ok }}
      ff_failure_reason: ${{ steps.sync.outputs.ff_failure_reason }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - id: sync
        shell: bash
        env:
          DRILL_FF_FAILURE: ${{ github.event_name == 'workflow_dispatch' && inputs.drill_ff_failure || false }}
        run: |
          set -euo pipefail

          drill_mode="false"
          if [[ "${DRILL_FF_FAILURE}" == "true" ]]; then
            drill_mode="true"
          fi
          echo "drill_mode=$drill_mode" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/HBAI-Ltd/Toonflow-app.git
          else
            git remote add upstream https://github.com/HBAI-Ltd/Toonflow-app.git
          fi

          upstream_branch="$(git ls-remote --symref upstream HEAD | awk '/^ref:/ {sub("refs/heads/","",$2); print $2; exit}')"
          if [[ -z "$upstream_branch" ]]; then
            upstream_branch="master"
          fi
          echo "upstream_branch=$upstream_branch" >> "$GITHUB_OUTPUT"

          git fetch --no-tags upstream "$upstream_branch"
          upstream_ref="upstream/$upstream_branch"
          upstream_sha="$(git rev-parse "$upstream_ref")"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --heads origin mirror/upstream-main >/dev/null 2>&1; then
            git fetch --no-tags origin mirror/upstream-main:refs/remotes/origin/mirror/upstream-main
            git switch --detach origin/mirror/upstream-main
            git switch -c mirror/upstream-main
          else
            git switch --detach "$upstream_ref"
            git switch -c mirror/upstream-main
          fi

          if [[ "$drill_mode" == "true" ]]; then
            echo "ff_ok=false" >> "$GITHUB_OUTPUT"
            echo "ff_failure_reason=drill: simulated ff failure" >> "$GITHUB_OUTPUT"
            echo "mirror_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Hard requirement: mirror only accepts fast-forward from upstream.
          if ! git merge-base --is-ancestor HEAD "$upstream_ref"; then
            echo "ff_ok=false" >> "$GITHUB_OUTPUT"
            echo "ff_failure_reason=mirror branch is not an ancestor of $upstream_ref" >> "$GITHUB_OUTPUT"
            echo "mirror_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --ff-only "$upstream_ref"
          mirror_sha="$(git rev-parse HEAD)"
          echo "mirror_sha=$mirror_sha" >> "$GITHUB_OUTPUT"

          if git push origin HEAD:refs/heads/mirror/upstream-main; then
            echo "ff_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ff_ok=false" >> "$GITHUB_OUTPUT"
            echo "ff_failure_reason=push to origin/mirror/upstream-main failed" >> "$GITHUB_OUTPUT"
          fi

  ensure_pr:
    runs-on: ubuntu-latest
    needs:
      - sync_mirror
    if: needs.sync_mirror.outputs.ff_ok == 'true'
    permissions:
      pull-requests: write
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      BASE: main
      HEAD: mirror/upstream-main
      UPSTREAM_BRANCH: ${{ needs.sync_mirror.outputs.upstream_branch }}
      UPSTREAM_SHA: ${{ needs.sync_mirror.outputs.upstream_sha }}
    steps:
      - name: Create or reuse PR (mirror -> main)
        shell: bash
        run: |
          set -euo pipefail

          head_enc="$(printf '%s' "$HEAD" | jq -sRr @uri)"
          status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${BASE}...${head_enc}" --jq '.status')"

          if [[ "$status" != "ahead" && "$status" != "diverged" ]]; then
            echo "No upstream changes to PR (compare status: $status)."
            exit 0
          fi

          gh label create "source:upstream" --color "1D76DB" --description "Automated upstream mirror sync PRs" || true

          existing="$(gh pr list --state open --base "$BASE" --head "$HEAD" --json number --jq '.[0].number')"
          title="chore(upstream): sync ${UPSTREAM_SHA:0:7}"
          body=$'Sync upstream -> mirror, then PR into main.\n\n'
          body+=$'- Upstream: `HBAI-Ltd/Toonflow-app ('"$UPSTREAM_BRANCH"$') @ '"$UPSTREAM_SHA"$'`\n'
          body+=$'- Mirror: `'"$HEAD"$'`\n'

          if [[ -z "$existing" ]]; then
            gh pr create --base "$BASE" --head "$HEAD" --title "$title" --body "$body" --label "source:upstream"
          else
            gh pr edit "$existing" --title "$title" --body "$body" --add-label "source:upstream"
          fi

  open_break_glass_issue:
    runs-on: ubuntu-latest
    needs:
      - sync_mirror
    if: needs.sync_mirror.outputs.ff_ok != 'true'
    permissions:
      issues: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      UPSTREAM_BRANCH: ${{ needs.sync_mirror.outputs.upstream_branch }}
      UPSTREAM_SHA: ${{ needs.sync_mirror.outputs.upstream_sha }}
      MIRROR_SHA: ${{ needs.sync_mirror.outputs.mirror_sha }}
      REASON: ${{ needs.sync_mirror.outputs.ff_failure_reason }}
      DRILL_MODE: ${{ needs.sync_mirror.outputs.drill_mode }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ALERT_WEBHOOK_URL: ${{ secrets.UPSTREAM_SYNC_ALERT_WEBHOOK_URL }}
    steps:
      - name: Open or update break-glass issue
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${DRILL_MODE:-false}" == "true" ]]; then
            title="break-glass(drill): mirror fast-forward failed"
            intro="The upstream mirror break-glass drill was triggered intentionally."
          else
            title="break-glass: mirror fast-forward failed"
            intro="The automated upstream mirror sync could not complete as fast-forward."
          fi

          owner_mention="@${GITHUB_REPOSITORY_OWNER}"
          body="$intro"$'\n\n'
          body+=$'- Owner: '"$owner_mention"$'\n'
          body+=$'- Drill mode: `'"${DRILL_MODE:-false}"$'`\n'
          body+=$'- Reason: `'"${REASON:-unknown}"$'`\n'
          body+=$'- Upstream branch: `'"${UPSTREAM_BRANCH:-unknown}"$'`\n'
          body+=$'- Upstream sha: `'"${UPSTREAM_SHA:-unknown}"$'`\n'
          body+=$'- Mirror sha: `'"${MIRROR_SHA:-unknown}"$'`\n'
          body+=$'- Run: '"$RUN_URL"$'\n\n'
          body+=$'Break-glass runbook:\n'
          body+=$'1. Temporarily allow force-push on `mirror/upstream-main`.\n'
          body+=$'2. `git fetch --prune upstream && git checkout mirror/upstream-main && git reset --hard upstream/'"${UPSTREAM_BRANCH:-master}"$'`\n'
          body+=$'3. `git push --force-with-lease origin mirror/upstream-main`\n'
          body+=$'4. Disable force-push again.\n'

          gh label create "source:upstream" --color "1D76DB" --description "Automated upstream mirror sync PRs" || true

          existing="$(gh issue list --state open --search "\"$title\" in:title" --json number --jq '.[0].number')"
          if [[ -z "$existing" ]]; then
            issue_url="$(gh issue create --title "$title" --body "$body" --label "source:upstream")"
          else
            gh issue comment "$existing" --body "$body"
            issue_url="$(gh issue view "$existing" --json url --jq '.url')"
          fi

          webhook_status="skipped"
          if [[ -n "${ALERT_WEBHOOK_URL:-}" ]]; then
            payload="$(jq -n \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg reason "${REASON:-unknown}" \
              --arg upstream_branch "${UPSTREAM_BRANCH:-unknown}" \
              --arg upstream_sha "${UPSTREAM_SHA:-unknown}" \
              --arg mirror_sha "${MIRROR_SHA:-unknown}" \
              --arg run_url "$RUN_URL" \
              --arg issue_url "${issue_url:-}" \
              --arg owner "$owner_mention" \
              --arg drill "${DRILL_MODE:-false}" \
              '{text: ("[upstream-sync] break-glass required for " + $repo), repo: $repo, owner: $owner, drill: ($drill == "true"), reason: $reason, upstream_branch: $upstream_branch, upstream_sha: $upstream_sha, mirror_sha: $mirror_sha, run_url: $run_url, issue_url: $issue_url}')"
            if curl -fsSL -X POST -H "Content-Type: application/json" --data "$payload" "$ALERT_WEBHOOK_URL" >/dev/null; then
              webhook_status="sent"
            else
              webhook_status="failed"
            fi
          fi
          echo "Webhook status: ${webhook_status}"

          {
            echo "### Break-glass required"
            echo "- Owner: ${owner_mention}"
            echo "- Drill mode: \`${DRILL_MODE:-false}\`"
            echo "- Reason: \`${REASON:-unknown}\`"
            echo "- Upstream: \`${UPSTREAM_BRANCH:-unknown}@${UPSTREAM_SHA:-unknown}\`"
            echo "- Mirror sha: \`${MIRROR_SHA:-unknown}\`"
            echo "- Issue: ${issue_url:-n/a}"
            echo "- Webhook status: ${webhook_status}"
            echo "- Run: ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

          # Keep the workflow red on ff-only failures even after notifications.
          exit 1
